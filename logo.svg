<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
    <!-- Globe disc -->
    <circle cx="50" cy="50" r="47" fill="#1a3a2a"/>
    <!-- Sparse wireframe in faint green grey -->
    <g fill="none" stroke="#486355" stroke-width="1">
        <circle cx="50" cy="50" r="47"/>
        <ellipse cx="50" cy="50" rx="23.5" ry="47"/>
        <line x1="50" y1="3" x2="50" y2="97"/>
        <ellipse cx="50" cy="31.2" rx="43.1" ry="7.3"/>
        <ellipse cx="50" cy="50" rx="47" ry="8"/>
        <ellipse cx="50" cy="68.8" rx="43.1" ry="7.3"/>
    </g>
    <!-- Small black star at the north pole, light edge so it reads on green -->
    <polygon points="50,13.4 51.86,18.34 57.15,18.58 53.01,21.88 54.42,26.98 50,24.06 45.58,26.98 46.99,21.88 42.85,18.58 48.14,18.34"
             fill="#0e100e" stroke="#cdd6d1" stroke-width="0.6"/>
    <!-- BWN monogram -->
    <text x="50" y="67" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="23" font-weight="bold" fill="#f5f8f6">BWN</text>
</svg>
