<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
    <!-- Globe disc -->
    <circle cx="50" cy="50" r="47" fill="#1a3a2a"/>
    <!-- Wireframe: meridians + latitudes in light grey -->
    <g fill="none" stroke="#cdd8d2" stroke-width="1" opacity="0.72">
        <circle cx="50" cy="50" r="47"/>
        <ellipse cx="50" cy="50" rx="30" ry="47"/>
        <ellipse cx="50" cy="50" rx="15" ry="47"/>
        <line x1="50" y1="3" x2="50" y2="97"/>
        <ellipse cx="50" cy="50" rx="47" ry="7.5"/>
        <ellipse cx="50" cy="36" rx="44.9" ry="7.2"/>
        <ellipse cx="50" cy="64" rx="44.9" ry="7.2"/>
        <ellipse cx="50" cy="22" rx="37.7" ry="6"/>
        <ellipse cx="50" cy="78" rx="37.7" ry="6"/>
    </g>
    <!-- BWN monogram -->
    <text x="50" y="67" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="23" font-weight="bold" fill="#f5f8f6">BWN</text>
</svg>
