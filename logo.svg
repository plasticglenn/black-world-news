<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
    <!-- Outer green disc -->
    <circle cx="50" cy="50" r="48" fill="#1a3a2a"/>
    <!-- Faint globe lines -->
    <ellipse cx="50" cy="50" rx="48" ry="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
    <ellipse cx="50" cy="50" rx="22" ry="48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
    <line x1="3" y1="50" x2="97" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
    <!-- Africa silhouette in gold (brand colour) -->
    <path d="M46 28 Q52 26 55 32 Q60 36 58 44 Q62 50 60 57 Q58 65 54 70 Q50 74 47 70 Q42 64 41 57 Q38 50 40 44 Q39 36 43 30 Z"
          fill="#ffd83d"/>
    <!-- Black Star, no outline (Marcus Garvey) -->
